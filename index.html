<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Exam Score Predictor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7fa;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            background: white;
            margin: auto;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #333;
        }
        form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        label {
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 8px;
            margin-top: 4px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }
        .full {
            grid-column: span 2;
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #0056b3;
        }
        .result {
            margin-top: 25px;
            padding: 15px;
            background: #eaf7ea;
            border-left: 5px solid green;
            font-size: 20px;
            text-align: center;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎓 Student Exam Score Predictor</h1>

        <form action="/predict_form" method="POST">
            <div>
                <label>Age</label>
                <input type="number" name="age" required>

            <div>
                <label>Gender</label>
                <select name="gender" required>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>

            <div>
                <label>Academic Level</label>
                <select name="academic_level" required>
                    <option value="Undergraduate">Undergraduate</option>
                    <option value="Postgraduate">Postgraduate</option>
                </select>
            </div>

            <div>
                <label>Study Hours</label>
                <input type="number" step="0.1" name="study_hours" required>
            </div>

            <div>
                <label>Self Study Hours</label>
                <input type="number" step="0.1" name="self_study_hours" required>
            </div>

            <div>
                <label>Online Classes Hours</label>
                <input type="number" step="0.1" name="online_classes_hours" required>
            </div>

            <div>
                <label>Social Media Hours</label>
                <input type="number" step="0.1" name="social_media_hours" required>
            </div>

            <div>
                <label>Gaming Hours</label>
                <input type="number" step="0.1" name="gaming_hours" required>
            </div>

            <div>
                <label>Sleep Hours</label>
                <input type="number" step="0.1" name="sleep_hours" required>
            </div>

            <div>
                <label>Screen Time Hours</label>
                <input type="number" step="0.1" name="screen_time_hours" required>
            </div>

            <div>
                <label>Exercise Minutes</label>
                <input type="number" name="exercise_minutes" required>
            </div>

            <div>
                <label>Caffeine Intake (mg)</label>
                <input type="number" name="caffeine_intake_mg" required>
            </div>

            <div>
                <label>Part Time Job (0/1)</label>
                <input type="number" name="part_time_job" required>
            </div>

            <div>
                <label>Upcoming Deadline (0/1)</label>
                <input type="number" name="upcoming_deadline" required>
            </div>

            <div>
                <label>Internet Quality</label>
                <select name="internet_quality" required>
                    <option value="Good">Good</option>
                    <option value="Average">Average</option>
                    <option value="Poor">Poor</option>
                </select>
            </div>

            <div>
                <label>Mental Health Score</label>
                <input type="number" step="0.1" name="mental_health_score" required>
            </div>

            <div>
                <label>Focus Index</label>
                <input type="number" step="0.1" name="focus_index" required>
            </div>

            <div>
                <label>Burnout Level</label>
                <input type="number" step="0.1" name="burnout_level" required>
            </div>

            <div>
                <label>Productivity Score</label>
                <input type="number" step="0.1" name="productivity_score" required>
            </div>

            <div class="full">
                <button type="submit">Predict Exam Score</button>
            </div>
        </form>

        {% if prediction %}
        <div class="result">
            🎯 Predicted Exam Score: <strong>{{ prediction }}</strong>
        </div>
        {% endif %}
    </div>
</body>
</html>
